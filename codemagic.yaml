workflows:
  android-workflow:
    name: Android Build v3
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up gradle wrapper
        script: |
          chmod +x $CM_BUILD_DIR/gradlew
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/*.apk
